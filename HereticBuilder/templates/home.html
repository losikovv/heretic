<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HereticTools</title>
  <link rel="stylesheet" href="/static/desktop.css">
</head>
<body>
  <main class="desktop">
    <section class="shell" aria-label="HereticTools">
      <div class="title-bar">
        <div class="title">HereticTools</div>
        <div class="title-controls" aria-hidden="true">
          <span class="title-control">x</span>
        </div>
      </div>
      <div class="panel">
        <div class="panel-content">
          <div class="launch-grid" aria-label="Primary sections">
            <button class="launcher" type="button" data-app="Codex" data-route="codex" aria-pressed="false">
              <span class="icon" aria-hidden="true">
                <img class="icon-art" src="/assets/icons/codex.png" alt="">
              </span>
              <span class="label">Codex</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <footer class="taskbar" aria-label="Desktop taskbar">
      <a class="start-button boosty-button" href="https://boosty.to/heretic" target="_blank" rel="noopener noreferrer" aria-label="Open Heretic on Boosty">
        <span class="start-mark boosty-mark" aria-hidden="true">
          <img class="start-art boosty-art" src="/assets/icons/boosty.png" alt="">
        </span>
        Boosty
      </a>
      <form class="taskbar-search" role="search" autocomplete="off">
        <label class="visually-hidden" for="taskbar-search-input">Search</label>
        <input id="taskbar-search-input" class="taskbar-search-input" type="search" name="q" placeholder="Search" aria-label="Search" aria-expanded="false" aria-controls="taskbar-search-results" autocomplete="off" spellcheck="false">
        <div id="taskbar-search-results" class="taskbar-search-results" role="list" hidden></div>
      </form>
    </footer>
  </main>

  <script src="/static/win-scrollbars.js" defer></script>
  <script src="/static/taskbar-search.js" defer></script>
  <script src="/static/home.js" defer></script>
</body>
</html>
