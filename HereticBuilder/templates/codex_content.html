<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ document_title }}</title>
  <link rel="stylesheet" href="/static/desktop.css">
  <link rel="stylesheet" href="/static/codex.css">
</head>
<body>
  <main class="desktop codex-page {{ page_class }}">
    <section class="shell" aria-label="{{ title }}">
      <div class="title-bar {{ title_bar_class }}" role="button" tabindex="0" aria-label="{{ back_label }}" title="{{ back_label }}" data-up-href="{{ back_href }}"{{ title_bar_style_attr }}>
        <div class="title">{{ window_title }}</div>
        <div class="title-controls" aria-hidden="true">
          <span class="title-control">_</span>
          <span class="title-control">[]</span>
          <span class="title-control">x</span>
        </div>
      </div>

      <nav class="menu-bar" aria-label="Application menu">
        <a class="menu-item" href="{{ back_href }}">File</a>
        <span class="menu-item">View</span>
        <span class="menu-item">Tools</span>
        <span class="menu-item">Help</span>
      </nav>

      <div class="panel">
        <div class="panel-content">
{{ content_html }}
        </div>
      </div>
    </section>

    <footer class="taskbar" aria-label="Desktop taskbar">
      <a class="start-button" href="/">
        <span class="start-mark" aria-hidden="true">
          <img class="start-art" src="/assets/icons/start.png" alt="">
        </span>
        Start
      </a>
      <div class="task-status">{{ task_title }}</div>
    </footer>
  </main>

  <script src="/static/win-scrollbars.js" defer></script>
  <script src="/static/codex.js" defer></script>
</body>
</html>
